<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Money Supply Flipbook</title>

  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

  <script defer src="js/katex-macros.js"></script>

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <!-- Data -->
  <script src="monetary-data.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #fdf6e3;
    }
    #chart-container {
      position: relative;
      width: 92%;
      max-width: 960px;
      margin: 0 auto;
      padding-top: 1rem;
    }
    #chart-svg {
      width: 100%;
      display: block;
    }
    .bar-label {
      position: absolute;
      white-space: nowrap;
      font-size: 1.0rem;
      color: #333;
      pointer-events: none;
    }
    .bracket-label {
      position: absolute;
      white-space: nowrap;
      font-size: 1.0rem;
      color: #333;
      pointer-events: none;
      text-align: center;
    }
    .tick-label {
      position: absolute;
      font-size: 1.0rem;
      color: #586e75;
      pointer-events: none;
    }
    .axis-title-label {
      position: absolute;
      font-size: 1.0rem;
      color: #586e75;
      pointer-events: none;
      white-space: nowrap;
    }
    #date-label {
      position: absolute;
      font-size: 1.0rem;
      color: #586e75;
      pointer-events: none;
      font-family: 'Times New Roman', serif;
      font-weight: bold;
    }
    .instructions {
      margin-top: 1rem;
      color: #93a1a1;
      font-family: 'Times New Roman', serif;
      font-size: 1.0rem;
      font-style: italic;
      text-align: center;
    }
  </style>
</head>
<body>

  <div id="chart-container">
    <svg id="chart-svg" viewBox="0 0 800 440" xmlns="http://www.w3.org/2000/svg">
      <!-- Y-axis -->
      <line x1="170" y1="35" x2="170" y2="378" stroke="#586e75" stroke-width="2"/>
      <!-- X-axis -->
      <line x1="170" y1="378" x2="670" y2="378" stroke="#586e75" stroke-width="2"/>

      <!-- X-axis ticks -->
      <g stroke="#586e75" stroke-width="1.5" id="tick-marks"></g>

      <!-- Bars -->
      <rect id="bar-0" x="170" y="45"  width="0" height="42" fill="#b0b7d4" rx="2"/>
      <rect id="bar-1" x="170" y="101" width="0" height="42" fill="#1a3a6b" rx="2"/>
      <rect id="bar-2" x="170" y="157" width="0" height="42" fill="#5ba08a" rx="2"/>
      <rect id="bar-3" x="170" y="213" width="0" height="42" fill="#e8a87c" rx="2"/>
      <rect id="bar-4" x="170" y="269" width="0" height="42" fill="#f0e0a0" rx="2"/>
      <rect id="bar-5" x="170" y="325" width="0" height="42" fill="#c0392b" rx="2"/>

      <!-- Bracket braces -->
      <path id="brace-mb" d="" stroke="#333" stroke-width="2" fill="none"/>
      <path id="brace-m1" d="" stroke="#333" stroke-width="2" fill="none"/>
      <path id="brace-m2" d="" stroke="#333" stroke-width="2" fill="none"/>
    </svg>

    <!-- Date label -->
    <div id="date-label"></div>

    <!-- Bar category labels -->
    <div id="label-0" class="bar-label">$\text{Total reserves held at the Fed}$</div>
    <div id="label-1" class="bar-label">$\text{Currency}$</div>
    <div id="label-2" class="bar-label">$\text{Checkable deposits}$</div>
    <div id="label-3" class="bar-label" style="white-space: normal; margin-top: -0.1em;">$\text{Other liquid}$<br>$\text{deposits}$</div>
    <div id="label-4" class="bar-label">$\text{Money market mutual funds}$</div>
    <div id="label-5" class="bar-label">$\text{Small-time deposits}$</div>

    <!-- Bracket text labels -->
    <div id="blabel-mb" class="bracket-label">$\text{Monetary}$<br>$\text{Base}$</div>
    <div id="blabel-m1" class="bracket-label">$\text{M1}$</div>
    <div id="blabel-m2" class="bracket-label">$\text{M2}$</div>

    <!-- X-axis tick labels (generated by JS) -->
    <div id="tick-labels"></div>

    <!-- X-axis title -->
    <div class="axis-title-label" id="axis-title">$\$\text{ in trillions}$</div>
  </div>

  <p class="instructions">Press &larr; &rarr; to navigate</p>

  <script>
    var VB_W = 800, VB_H = 440;
    var X_ORIGIN = 170, BAR_AREA_W = 500, MAX_T = 14;
    var PX_PER_T = BAR_AREA_W / MAX_T;
    var BAR_H = 42, BAR_GAP = 14, BAR_START_Y = 45;
    var BAR_Y = [];
    for (var i = 0; i < 6; i++) BAR_Y[i] = BAR_START_Y + i * (BAR_H + BAR_GAP);

    var brackets = [
      { id: 'mb', topBar: 0, bottomBar: 1, tipX: 155, labelX: 50, midOffset: -10 },
      { id: 'm1', topBar: 1, bottomBar: 3, tipX: 130, labelX: 88, topYOverride: 108 },
      { id: 'm2', topBar: 1, bottomBar: 5, tipX: 65, labelX: 15, topYOverride: 178 }
    ];

    var currentIndex = -1;

    function svgToPx(svgX, svgY) {
      var r = document.getElementById('chart-svg').getBoundingClientRect();
      return { x: (svgX / VB_W) * r.width, y: (svgY / VB_H) * r.height };
    }

    function generateTicks() {
      var tickG = document.getElementById('tick-marks');
      var tickLabelsDiv = document.getElementById('tick-labels');
      tickG.innerHTML = '';
      tickLabelsDiv.innerHTML = '';
      for (var i = 0; i <= MAX_T; i++) {
        var x = X_ORIGIN + i * PX_PER_T;
        var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', x); line.setAttribute('y1', 378);
        line.setAttribute('x2', x); line.setAttribute('y2', 386);
        tickG.appendChild(line);
        var div = document.createElement('div');
        div.className = 'tick-label';
        div.id = 'tick-' + i;
        div.textContent = '$' + i + '$';
        tickLabelsDiv.appendChild(div);
      }
    }

    function positionBarLabels(values) {
      for (var i = 0; i < 6; i++) {
        var el = document.getElementById('label-' + i);
        var barW = values[i] * PX_PER_T;
        var p = svgToPx(X_ORIGIN + barW + 10, BAR_Y[i] + BAR_H / 2);
        el.style.left = p.x + 'px';
        el.style.top = p.y + 'px';
        el.style.transform = 'translateY(-50%)';
      }
    }

    function positionFixedLabels() {
      for (var i = 0; i <= MAX_T; i++) {
        var el = document.getElementById('tick-' + i);
        if (!el) continue;
        var p = svgToPx(X_ORIGIN + i * PX_PER_T, 393);
        el.style.left = p.x + 'px';
        el.style.top = p.y + 'px';
        el.style.transform = 'translateX(-50%)';
      }
      var tp = svgToPx(670, 422);
      var te = document.getElementById('axis-title');
      te.style.left = tp.x + 'px';
      te.style.top = tp.y + 'px';
      te.style.transform = 'translateX(-100%)';
      var dp = svgToPx(10, 0);
      var de = document.getElementById('date-label');
      de.style.left = dp.x + 'px';
      de.style.top = dp.y + 'px';
      initBraces();
    }

    function bracePath(tipX, y1, y2, midOverride) {
      var mid = midOverride != null ? midOverride : (y1 + y2) / 2;
      var d = 10;
      var r = Math.min(18, (y2 - y1) * 0.18);
      var cx = tipX - d / 2;
      var px = tipX - d;
      return 'M ' + tipX + ' ' + y1 +
        ' Q ' + cx + ' ' + y1 + ' ' + cx + ' ' + (y1 + r) +
        ' L ' + cx + ' ' + (mid - r) +
        ' Q ' + cx + ' ' + mid + ' ' + px + ' ' + mid +
        ' Q ' + cx + ' ' + mid + ' ' + cx + ' ' + (mid + r) +
        ' L ' + cx + ' ' + (y2 - r) +
        ' Q ' + cx + ' ' + y2 + ' ' + tipX + ' ' + y2;
    }

    function initBraces() {
      brackets.forEach(function(b) {
        var braceEl = document.getElementById('brace-' + b.id);
        var labelEl = document.getElementById('blabel-' + b.id);
        var topY = b.topYOverride != null ? b.topYOverride : BAR_Y[b.topBar] - 3;
        var bottomY = b.bottomYOverride != null ? b.bottomYOverride : BAR_Y[b.bottomBar] + BAR_H + 3;
        var centerY = (topY + bottomY) / 2;
        var customMid = b.midOffset ? (topY + bottomY) / 2 + b.midOffset : null;
        braceEl.setAttribute('d', bracePath(b.tipX, topY, bottomY, customMid));
        var lp = svgToPx(b.labelX, centerY);
        labelEl.style.left = lp.x + 'px';
        labelEl.style.top = lp.y + 'px';
        labelEl.style.transform = 'translate(-50%, -50%)';
      });
    }

    function showDate(index) {
      if (index < 0 || index >= moneySupplyData.length) return;
      var entry = moneySupplyData[index];
      var values = entry.values;
      document.getElementById('date-label').textContent = entry.date;
      for (var i = 0; i < 6; i++) {
        var targetW = values[i] * PX_PER_T;
        gsap.to('#bar-' + i, { attr: { width: targetW }, duration: 0.4, ease: 'power2.out' });
      }
      setTimeout(function() { positionBarLabels(values); }, 50);
      currentIndex = index;
    }

    function nextDate() {
      if (currentIndex < moneySupplyData.length - 1) showDate(currentIndex + 1);
    }

    function prevDate() {
      if (currentIndex > 0) showDate(currentIndex - 1);
    }

    window.addEventListener('load', function() {
      requestAnimationFrame(function() {
        generateTicks();
        if (typeof renderMathInElement !== 'undefined') {
          renderMathInElement(document.getElementById('tick-labels'), {
            delimiters: [{ left: '$', right: '$', display: false }],
            throwOnError: false
          });
        }
        positionFixedLabels();
        showDate(0);
      });
    });

    window.addEventListener('resize', function() {
      clearTimeout(window._resizeTimer);
      window._resizeTimer = setTimeout(function() {
        positionFixedLabels();
        if (currentIndex >= 0) positionBarLabels(moneySupplyData[currentIndex].values);
      }, 100);
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowRight') { e.preventDefault(); nextDate(); }
      else if (e.key === 'ArrowLeft') { e.preventDefault(); prevDate(); }
    });
  </script>

</body>
</html>
